groups:
  - name: monitoring.rules
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target down"
          description: "Target {{ $labels.instance }} for job {{ $labels.job }} has been down for more than 2 minutes."

      - alert: HighHostCpuUsage
        expr: avg(1 - rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High host CPU usage"
          description: "Average host CPU usage is above 85% for 10 minutes."

      - alert: HighHostMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High host memory usage"
          description: "Host memory usage is above 90% for 10 minutes."

      - alert: LowHostDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!="",mountpoint="/"} / node_filesystem_size_bytes{fstype!="",mountpoint="/"}) < 0.15
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on root filesystem"
          description: "Available disk space on / is below 15% for 15 minutes."
